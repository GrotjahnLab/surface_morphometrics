# UNIVERSAL
seg_dir: "./thickness_examples/segmentations/"  # Directory containing segmentation MRC files
tomo_dir: "./thickness_examples/tomograms/"  # Directory containing tomogram MRC files (for thickness measurements)
work_dir: "./thickness_examples/morphometrics/"  # Working directory for output files
exp_name: "test" # Subdirectory of work folder for this experiment
segmentation_values: # The value used to represent each feature, and the name of the feature.
  OMM: 1
  IMM: 2
  ER: 3
cores: 6 # Number of cores to use for parallel processing.

#SEGMENTATION TO MESH 
surface_generation:
  angstroms: false # Default scaling adjusts so surfaces are nm-scaled, if set to true surfaces are not rescaled and remain angstrom-scaled.
  ultrafine: false # Not necessary under normal conditions but may help with unusually challenging membranes. Uses additional subdivision and resampling before cropping.
  extrapolation_distance: 1.5 # Distance in nm (or angstroms, if angstrom setting is True) to extrapolate the surface
  isotropic_remesh: true # If true, applies isotropic remeshing to create near-equilateral triangles with target average area.
  target_area: 1.0 # Target average triangle area in square units (nm^2 by default). Used when isotropic_remesh is true. Values between 1.0 and 3.0 generally yield good results, but smaller triangles significantly increase computation time.
  simplify: false # If true, decimates the mesh to simplify_max_triangles. Note: simplified surfaces will not be isotropic.
  simplify_max_triangles: 300000 # ONLY used when simplify is true (not the default). When using isotropic_remesh, target_area controls triangle count instead.
  octree_depth: 9 # Increase if the surface is too smooth, decrease if surface is too jagged - but has a HUGE effect.
  point_weight: 0.7 # Larger numbers have stronger weight towards fitting segmented points, smaller numbers have stronger weight towards generating a smooth surface
  neighbor_count: 400 # Number of neighbors used for normal estimation. Should not need to adjust this, but I am exposing it as a tuning variable. Values over 50 seem to all be equivalently good...
  smoothing_iterations: 1 # Number of smoothing iterations to perform for estimating normals. You should usually leave this at 1.

# PYCURV
curvature_measurements:
  radius_hit: 9 # This corresponds to the radius of the smallest feature of interest, roughly, for neighborhood determination. 8-15 seems to be a good range for mitochondria
  min_component: 30 # The minimum number of triangles for a component to be considered for curvature measurement.
  exclude_borders: 1 # Values greater than zero exclude the border from the curvature calculation by n nm/angstroms.
distance_and_orientation_measurements:
  mindist: 3 # Minimum distance between two points for them to be considered for distance measurement.
  maxdist: 400 # Maximum distance between two points for them to be considered for distance measurement.
  tolerance: 0.1 # Tolerance for determining if a triangle is contacted by a line.
  verticality: true # Measure verticality (angle relative to growth plane). 
  intra: # Intra-surface distance/orientation (verticality) measurements
    - OMM
    - IMM
    - ER
  relative_orientation: true # Measure relative orientation (angle relative to nearest neighbor surface).
  inter: # Intersurface distance/orientation measurements. Writes out symmetrically so you do not need to give symmetric options.
    OMM:
      - IMM
      - ER
 
# DENSITY SAMPLING (used by sample_density.py)
density_sampling:
  sample_spacing: 0.25  # Distance in nm between samples along normal vectors. Should divide evenly into scan_range.
  scan_range: 10  # Half-range in nm to scan along normal vectors (scans from -scan_range to +scan_range)

# THICKNESS MEASUREMENTS (used by measure_thickness.py)
thickness_measurements:
  average_radius: 12  # Radius in nm for local averaging in thickness calculations
  fit_curve: true  # Fit dual gaussian to estimate thickness
  components:  # Components to process for thickness measurements
    - OMM
    - IMM
    - ER

# PATCH ANALYSIS (used by generate_patches.py and label_connected_components.py)
patch_analysis:
  membrane_label: IMM            # Which segmentation_values label to place patches on (batch mode)
  patch_radius: 12               # nm; triangles within this distance of a center join the patch
  particle_max_distance: 24      # nm; skip patches when the particle is farther than this from the membrane. Set to null to disable.
  generate_random: true          # Also generate matched random control patches
  random_min_distance: 12        # nm; minimum spacing between random patch centers
  random_seed: 0                 # Seed for reproducible random patches
  star_dir: "./star/"            # Directory of STAR files (batch mode)
  star_pattern: "{tomo}.star"    # How to find the STAR file for a tomogram basename
  star_tomo_column: null         # Only needed for combined multi-tomogram STAR files: the column holding the tomogram/micrograph name (e.g. rlnMicrographName or rlnTomoName). When set, only rows containing the tomogram name are used. Leave null if each STAR holds a single tomogram.
  star_coord_columns: [rlnCoordinateX, rlnCoordinateY, rlnCoordinateZ]  # Particle coordinate columns
  star_pixelsize_column: rlnPixelSize  # Pixel size column (Angstrom/pixel)
  star_coords_in_pixels: true    # If true, multiply coordinates by the pixel-size column
  annotate_star: true            # Write an annotated STAR with patch_id, mesh_distance, mesh_neighbor_id
  min_component_size: 0          # label_connected_components.py: drop components smaller than this (0 = keep all)
  statistics_properties: [curvedness_VV, thickness]  # patch_statistics.py: per-triangle properties to summarize per region

# MESH REFINEMENT (used by refine_mesh.py)
mesh_refinement:
  iterations: 6  # Number of refinement iterations
  damping_factor: 0.9  # Fraction of impulse to apply (0-1). Lower values prevent oscillation; 0.9 works well.
  monolayer: false  # Set to true for high-defocus data where bilayer is not resolved. Fits single Gaussian instead of dual.
  xcorr_iterations: [1, 2, 3]  # Iterations that use cross-correlation to sharpen the bilayer peaks; the remaining iterations use per-triangle dual Gaussian fitting for precise centering. (Takes priority over use_xcorr; set `use_xcorr: true` instead to use cross-correlation for every iteration.)
  average_radius: 25  # Radius in nm for local averaging of density profiles. Larger values = more smoothing.
  average_radius_decay: 1.0  # Factor to multiply radius by each iteration (e.g., 0.8 = 20% reduction). 1.0 = no decay, keeps profiles clean throughout.
  average_radius_min: 12.0  # Minimum averaging radius in nm (prevents over-fitting to noise in later iterations).
  max_total_offset: 8  # Maximum total displacement from original surface in nm. Prevents divergence in poorly-fit regions.
  # Smoothing options to reduce surface roughness
  smooth_offsets: true  # Spatially smooth the offset field before applying to vertices. Reduces local noise.
  offset_smoothing_radius: 25  # Radius for offset smoothing in nm. Match to average_radius to remove noise from the offset field. If null, uses average_radius.
  laplacian_iterations: 5  # Number of Laplacian smoothing iterations after displacement (0 = disabled).
  laplacian_lambda: 0.5  # Laplacian smoothing strength (0-1). Higher = more smoothing but may lose detail.
  lowpass_sigma: 0  # 3D Gaussian low-pass filter sigma in nm applied to tomogram before sampling. 0 = disabled. Try 1-3 nm for noisy data.
  convergence_threshold: 0.05  # nm - stop iterating (per phase) when mean |offset| drops below this.





